<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Croc: Legend of the Gobbos (PS1)</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; background: #000; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #game { width: 100vw; height: 100vh; background: #000; }

    #overlay {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: rgba(0,0,0,0.82); z-index: 9999;
    }
    #card {
      width: min(520px, 92vw);
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(12,12,16,0.72);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 16px 60px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #top { display: flex; align-items: center; gap: 12px; }
    #spinner {
      width: 18px; height: 18px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: rgba(120,220,255,0.95);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #title { margin: 0; font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.92); }
    #msg { margin: 10px 0; font-size: 12px; color: rgba(255,255,255,0.72); min-height: 18px; }
    #barWrap { height: 10px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.10); }
    #bar { height: 100%; width: 0%; background: linear-gradient(90deg, rgba(70,100,255,0.95), rgba(120,220,255,0.95)); transition: width 0.12s ease; }
    #meta { margin-top: 8px; font-size: 11px; color: rgba(255,255,255,0.55); display: flex; justify-content: space-between; gap: 10px; }
    #actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: #fff; padding: 9px 12px; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 12px; user-select: none; }
    .btn:hover { background: rgba(255,255,255,0.12); }
    #err { margin-top: 10px; font-size: 11px; color: rgba(255,180,180,0.85); white-space: pre-wrap; display: none; }
  </style>
</head>

<body>
  <div id="game"></div>

  <div id="overlay">
    <div id="card">
      <div id="top">
        <div id="spinner"></div>
        <h1 id="title">Loading Croc (PS1)</h1>
      </div>

      <div id="msg">Starting…</div>
      <div id="barWrap"><div id="bar"></div></div>

      <div id="meta">
        <div id="pct">0%</div>
        <div id="right"></div>
      </div>

      <div id="actions">
        <button class="btn" id="retry" style="display:none;">Retry</button>
        <button class="btn" id="clear" style="display:none;">Clear cache</button>
      </div>

      <div id="err"></div>
    </div>
  </div>

  <script>
    window.onbeforeunload = () => "Leave the game? Progress may be lost.";

    const CUE_FILE = "Croc - Legend of the Gobbos (Europe).cue";

    // Optional BIOS: add file and set the name if you want
    // const BIOS_FILE = "scph5502.bin";
    const BIOS_FILE = "";

    const CACHE_NAME = "croc-track01-cache-v2";

    const overlay = document.getElementById("overlay");
    const msgEl = document.getElementById("msg");
    const barEl = document.getElementById("bar");
    const pctEl = document.getElementById("pct");
    const rightEl = document.getElementById("right");
    const errEl = document.getElementById("err");
    const retryBtn = document.getElementById("retry");
    const clearBtn = document.getElementById("clear");

    function setProgress(p, rightText) {
      const clamped = Math.max(0, Math.min(1, p));
      const pct = Math.floor(clamped * 100);
      barEl.style.width = pct + "%";
      pctEl.textContent = pct + "%";
      rightEl.textContent = rightText || "";
    }

    function showError(message) {
      msgEl.textContent = "Load failed.";
      errEl.style.display = "block";
      errEl.textContent = message;
      retryBtn.style.display = "inline-block";
      clearBtn.style.display = "inline-block";
    }

    retryBtn.onclick = () => location.reload();
    clearBtn.onclick = async () => {
      try { if ("caches" in window) await caches.delete(CACHE_NAME); } catch {}
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }
      } catch {}
      location.reload();
    };

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) throw new Error("Service worker not supported.");
      await navigator.serviceWorker.register("./sw.js", { scope: "./" });
      await navigator.serviceWorker.ready;
    }

    async function precacheTrack01Parts() {
      // This is optional. It makes first boot smoother.
      if (!("caches" in window)) return;

      const parts = [
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.001",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.002",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.003",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.004",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.005",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.006",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.007",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.008",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.009",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.010",
        "Croc - Legend of the Gobbos (Europe) (Track 01).bin.011"
      ];

      const cache = await caches.open(CACHE_NAME);

      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const hit = await cache.match(part);
        if (hit) {
          msgEl.textContent = "Preparing…";
          setProgress((i + 1) / parts.length, "cached");
          continue;
        }

        msgEl.textContent = "Downloading…";
        setProgress(i / parts.length, `${i + 1}/${parts.length}`);

        const resp = await fetch(part, { cache: "no-store" });
        if (!resp.ok) throw new Error(`Missing or blocked: ${part} (${resp.status})`);

        // Store clean binary in cache
        const buf = await resp.arrayBuffer();
        await cache.put(part, new Response(buf, { headers: { "Content-Type": "application/octet-stream" } }));
      }

      setProgress(1, "");
    }

    function bootEmulator() {
      // Prevent that en-GB json fetch problem
      window.EJS_language = "en";

      window.EJS_player = "#game";
      window.EJS_core = "psx";
      window.EJS_gameUrl = CUE_FILE;
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

      if (BIOS_FILE) window.EJS_biosUrl = BIOS_FILE;

      msgEl.textContent = "Starting…";
      setProgress(1, "");

      const s = document.createElement("script");
      s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
      s.onerror = () => showError("Failed to load EmulatorJS (blocked network or extension).");
      s.onload = () => setTimeout(() => { overlay.style.display = "none"; }, 700);
      document.body.appendChild(s);
    }

    (async () => {
      try {
        msgEl.textContent = "Starting…";
        setProgress(0.03, "");

        await registerServiceWorker();

        msgEl.textContent = "Preparing…";
        setProgress(0.06, "");

        await precacheTrack01Parts();

        bootEmulator();
      } catch (e) {
        showError((e && e.message) ? e.message : String(e));
      }
    })();
  </script>
</body>
</html>
