<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Croc: Legend of the Gobbos (PS1)</title>
  <link rel="icon" href="data:,">
  <style>
    html,body{height:100%;margin:0;background:#000;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    #game{width:100vw;height:100vh;background:#000}
    #overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.86);z-index:9}
    #box{width:min(520px,92vw);border:1px solid rgba(255,255,255,.14);background:rgba(12,12,16,.74);border-radius:16px;padding:16px}
    #row{display:flex;align-items:center;gap:10px}
    #sp{width:16px;height:16px;border-radius:999px;border:2px solid rgba(255,255,255,.22);border-top-color:rgba(120,220,255,.95);animation:s .8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
    #msg{margin:10px 0 12px 0;font-size:12px;color:rgba(255,255,255,.75)}
    #barw{height:10px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.10)}
    #bar{height:100%;width:0%;background:linear-gradient(90deg,rgba(70,100,255,.95),rgba(120,220,255,.95));transition:width .12s ease}
    #err{margin-top:10px;font-size:11px;color:rgba(255,180,180,.9);white-space:pre-wrap;display:none}
    #btn{margin-top:12px;display:none;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;padding:10px 12px;border-radius:12px;cursor:pointer;font-weight:800;font-size:12px}
    #btn:hover{background:rgba(255,255,255,.12)}
  </style>
</head>
<body>
  <div id="game"></div>

  <div id="overlay">
    <div id="box">
      <div id="row"><div id="sp"></div><div style="font-weight:800;font-size:13px;color:rgba(255,255,255,.92)">Loading Croc (PS1)</div></div>
      <div id="msg">Starting…</div>
      <div id="barw"><div id="bar"></div></div>
      <button id="btn">Click to play</button>
      <div id="err"></div>
    </div>
  </div>

  <script>
    window.onbeforeunload = () => "Leave the game? Progress may be lost.";

    const CUE = "croc.cue"; // must exist in the same folder as this index.html

    const overlay = document.getElementById("overlay");
    const msg = document.getElementById("msg");
    const bar = document.getElementById("bar");
    const err = document.getElementById("err");
    const btn = document.getElementById("btn");

    function setP(p){bar.style.width=Math.max(0,Math.min(1,p))*100+"%";}

    async function probeCue() {
      // FORCE the browser to request the cue so you can see it in Network.
      const u = new URL(CUE, location.href).toString();
      msg.textContent = "Checking cue…";
      setP(0.25);

      const head = await fetch(u, { method: "HEAD", cache: "no-store" });
      if (!head.ok) throw new Error("Cue HEAD failed: " + head.status + " " + head.statusText);

      const get = await fetch(u, { method: "GET", cache: "no-store" });
      if (!get.ok) throw new Error("Cue GET failed: " + get.status + " " + get.statusText);

      msg.textContent = "Cue OK.";
      setP(0.45);
    }

    function boot() {
      // EmulatorJS config MUST be on window BEFORE loader.js runs
      window.EJS_player = "#game";
      window.EJS_core = "psx";
      window.EJS_gameUrl = CUE;
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
      window.EJS_language = "en";

      msg.textContent = "Loading emulator…";
      setP(0.75);

      const s = document.createElement("script");
      s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
      s.onerror = () => fail("Failed to load EmulatorJS loader.js");
      s.onload = () => {
        msg.textContent = "Ready.";
        setP(1);
        btn.style.display = "inline-block";
      };
      document.body.appendChild(s);
    }

    function fail(t){
      msg.textContent = "Load failed.";
      err.style.display = "block";
      err.textContent = t;
      btn.style.display = "inline-block";
      btn.textContent = "Retry";
      btn.onclick = () => location.reload();
      document.getElementById("sp").style.display = "none";
    }

    btn.onclick = async () => {
      overlay.style.display = "none";
      try { await document.documentElement.requestFullscreen?.(); } catch {}
    };

    (async () => {
      try {
        await probeCue();      // <- if this runs, you WILL see cue requests in Network
        boot();                // <- then EmulatorJS will request cue again and then tracks
      } catch (e) {
        fail(e?.message || String(e));
      }
    })();
  </script>
</body>
</html>
